name: Release

on:
  push:
    branches: [main]

# Prevent overlapping release runs.
concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # create the version PR / tags
  pull-requests: write # open the "Version Packages" PR
  id-token: write # npm provenance (trusted publishing)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: pnpm install --frozen-lockfile

      # When changesets exist on main, this opens/updates a "Version Packages" PR.
      # When that PR is merged (changesets consumed), it builds and publishes.
      # Publishing requires the NPM_TOKEN secret; without it, only the version PR
      # is managed and nothing is published.
      - name: Create Release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
