name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint (SonarJS rules)
        run: pnpm lint

      - name: Build packages
        run: pnpm build

      - name: Typecheck
        run: |
          pnpm typecheck
          pnpm --filter @musclemap/playground exec tsc --noEmit -p tsconfig.json

      - name: Test
        run: pnpm test

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high

      - name: Pack & verify publishable tarballs
        # pnpm pack rewrites `workspace:*` to concrete versions (npm pack does not).
        # Guard that no tarball ships an unresolved workspace: dependency.
        run: |
          pnpm --filter "./packages/*" -r pack   # tarballs are written to the repo root
          fail=0
          for tgz in *.tgz; do
            echo "── $tgz ──"
            tar -xzOf "$tgz" package/package.json
            if tar -xzOf "$tgz" package/package.json | grep -q '"workspace:'; then
              echo "ERROR: $tgz contains an unresolved workspace: dependency"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then exit 1; fi
          echo "All package tarballs have resolved (non-workspace) dependencies."
